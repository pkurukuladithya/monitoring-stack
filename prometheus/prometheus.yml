global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["hs-alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["hs-prometheus:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["hs-node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["hs-cadvisor:8080"]